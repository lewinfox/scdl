name: build-and-push

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "main.py"
      - "index.html"
      - "login.html"
      - "pyproject.toml"
      - ".github/workflows/publish.yml"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: scdl
    outputs:
      image_ref: ${{ steps.ref.outputs.image_ref }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      # GHCR refs must be lowercase. github.repository_owner preserves case,
      # so normalise it here. Expose it as a step output too so the deploy job
      # can pin to this exact build.
      - name: Resolve image ref
        id: ref
        run: |
          REF="${REGISTRY}/${OWNER,,}/${IMAGE_NAME}"
          echo "IMAGE_REF=${REF}" >> "$GITHUB_ENV"
          echo "image_ref=${REF}" >> "$GITHUB_OUTPUT"
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REF }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          # Pi 4/5 64-bit runs arm64; bake amd64 too so we can pull from any
          # workstation. arm64 is QEMU-emulated on the runner so the first
          # build takes a while.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    # Only ship from main. The published GHCR package is public, so fly pulls
    # it without registry credentials.
    if: github.ref == 'refs/heads/main'
    concurrency:
      group: deploy-scdl
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      # Deploy the exact image this run built, pinned by digest so the deploy
      # is immutable and can't race a newer push to :latest.
      - name: Deploy to fly.io
        run: flyctl deploy --image "${IMAGE}@${DIGEST}"
        env:
          IMAGE: ${{ needs.publish.outputs.image_ref }}
          DIGEST: ${{ needs.publish.outputs.digest }}
          FLY_API_TOKEN: ${{ secrets.FLY_IO_API_KEY }}
