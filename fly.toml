app = "scdl-lewinfox"
primary_region = "syd"

[build]
  image = "ghcr.io/lewinfox/scdl:latest"

[env]
  SCDL_DATA_DIR = "/data"

[http_service]
  internal_port = 8765
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "scdl_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
